<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;--surface:#111;--border:#1e1e1e;--border2:#252525;
  --orange:#e8601a;--yellow:#f7b500;--text:#e8e8e0;--muted:#555;--dim:#333;
}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh}
.app{max-width:1000px;margin:0 auto;padding:2rem 1.5rem 4rem}
.header{display:flex;align-items:baseline;gap:16px;border-bottom:1px solid var(--border);padding-bottom:1.2rem;margin-bottom:2rem}
.header-title{font-size:1.9rem;font-weight:800;letter-spacing:-0.5px}
.header-title span{color:var(--orange)}
.header-sub{font-family:'DM Mono',monospace;font-size:.82rem;color:var(--muted);letter-spacing:.5px}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:1.8rem}
.tab{padding:.65rem 1.4rem;font-family:'Syne',sans-serif;font-weight:700;font-size:.85rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none}
.tab.active{color:var(--orange);border-bottom-color:var(--orange)}
.tab-panel{display:none}.tab-panel.active{display:block}
.search-row{display:flex;gap:10px;margin-bottom:10px}
.search-input{flex:1;background:#141414;border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:'DM Mono',monospace;font-size:1rem;padding:.7rem 1rem;outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--orange);box-shadow:0 0 0 2px rgba(232,96,26,.1)}
.search-input::placeholder{color:var(--dim)}
.btn{background:var(--orange);color:#0d0d0d;border:none;border-radius:6px;font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;padding:.7rem 1.6rem;cursor:pointer;transition:opacity .15s;white-space:nowrap}
.btn:hover{opacity:.85}
.btn-outline{background:transparent;color:var(--orange);border:1px solid rgba(232,96,26,.45);font-family:'DM Mono',monospace;font-size:.8rem;padding:.45rem 1rem}
.btn-outline:hover{border-color:var(--orange);background:rgba(232,96,26,.05)}
.hints{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:1.4rem}
.hint{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--muted);background:#141414;border:1px solid var(--border2);padding:3px 9px;border-radius:99px}
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.8rem;position:relative;overflow:hidden;margin-bottom:1rem}
.result-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--orange),var(--yellow))}
.result-tag{display:inline-block;font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:2px;text-transform:uppercase;color:var(--orange);background:rgba(232,96,26,.08);border:1px solid rgba(232,96,26,.3);padding:3px 10px;border-radius:99px;margin-bottom:12px}
.result-big{font-family:'DM Mono',monospace;font-size:3rem;font-weight:500;color:var(--yellow);letter-spacing:1px;line-height:1;margin-bottom:1.4rem}
.result-row{display:flex;gap:12px;margin-bottom:9px;align-items:baseline}
.result-label{font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted);min-width:110px;flex-shrink:0}
.result-value{font-size:.92rem;color:#c8c8c0}
.result-value.mono{font-family:'DM Mono',monospace;color:var(--text)}
.result-comment{margin-top:.9rem;padding:.7rem 1rem;background:rgba(255,255,255,.025);border-left:2px solid rgba(232,96,26,.5);border-radius:0 4px 4px 0;font-size:.88rem;color:#888;font-style:italic}
.serie-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:1rem}
.serie-title{font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:1rem}
.serie-block{margin-bottom:1rem}.serie-block:last-child{margin-bottom:0}
.serie-block-label{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:1px;text-transform:uppercase;color:var(--dim);margin-bottom:4px}
.serie-block-value{font-family:'DM Mono',monospace;font-size:.88rem;color:var(--text);word-break:break-all}
.serie-empty{color:var(--dim);font-size:.85rem;font-style:italic}
.serie-divider{height:1px;background:var(--border);margin:.8rem 0}
.result-grid{display:grid;grid-template-columns:1fr}
@media(min-width:640px){.result-grid{grid-template-columns:2fr 1fr;gap:1rem}}
.no-result{text-align:center;padding:3rem 1rem;color:var(--dim);font-size:1.1rem}
.no-result em{color:var(--orange);font-style:normal}
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:10px;margin-bottom:1rem}
table{width:100%;border-collapse:collapse;font-size:.82rem}
thead tr{background:#141414}
th{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:.7rem 1rem;text-align:left;border-bottom:1px solid var(--border)}
td{padding:.65rem 1rem;color:#c8c8c0;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;font-size:.8rem;cursor:pointer}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:rgba(232,96,26,.05);color:var(--text)}
tbody tr.selected td{background:rgba(232,96,26,.1);color:var(--text)}
.stats-bar{display:flex;flex-wrap:wrap;gap:20px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.9rem 1.2rem;margin-bottom:1.4rem;align-items:center}
.stat{text-align:center}
.stat-val{font-family:'DM Mono',monospace;font-size:1.2rem;font-weight:500;color:var(--yellow)}
.stat-val.warn{color:var(--orange)}
.stat-lbl{font-size:.65rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-top:2px}
.stat-sep{color:var(--border);font-size:1.5rem}
.multi-textarea{width:100%;background:#141414;border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:'DM Mono',monospace;font-size:.88rem;padding:.8rem 1rem;outline:none;resize:vertical;transition:border-color .2s}
.multi-textarea:focus{border-color:var(--orange)}
.section-label{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:.7rem}
.not-found-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:.8rem}
.nf-chip{font-family:'DM Mono',monospace;font-size:.75rem;background:rgba(232,96,26,.08);border:1px solid rgba(232,96,26,.3);color:#ffa07a;padding:3px 8px;border-radius:4px}
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.modal-backdrop.open{display:flex}
.modal{background:#161616;border:1px solid var(--border);border-radius:14px;padding:2rem;width:min(500px,95vw);max-height:85vh;overflow-y:auto;position:relative}
.modal-title{font-size:1rem;font-weight:700;margin-bottom:1.4rem}
.modal-close{position:absolute;top:1rem;right:1rem;background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer;line-height:1}
.modal-close:hover{color:var(--text)}
.field{margin-bottom:1rem}
.field label{display:block;font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.field input,.field textarea{width:100%;background:#0d0d0d;border:1px solid var(--border2);border-radius:5px;color:var(--text);font-family:'DM Mono',monospace;font-size:.88rem;padding:.55rem .8rem;outline:none}
.field input:focus,.field textarea:focus{border-color:var(--orange)}
.field textarea{resize:vertical;min-height:70px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.4rem}
.badge-edit{display:inline-block;font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:1px;background:rgba(232,96,26,.12);color:var(--orange);border:1px solid rgba(232,96,26,.3);padding:2px 7px;border-radius:3px;margin-left:6px;vertical-align:middle}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#1a1a1a;border:1px solid var(--orange);border-radius:8px;padding:.7rem 1.2rem;font-family:'DM Mono',monospace;font-size:.82rem;color:var(--text);z-index:200;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-title">Parc <span>HME</span> ↔ RZB</div>
    <div class="header-sub" id="header-stats">chargement…</div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('search')">Recherche</button>
    <button class="tab" onclick="switchTab('multi')">Multi-recherche</button>
  </div>
  <div id="tab-search" class="tab-panel active">
    <div class="search-row">
      <input id="search-input" class="search-input" type="text"
        placeholder="Ex : H01100M · X001L · AB-123-CD · pelle bassin"
        autocomplete="off" spellcheck="false"
        onkeydown="if(event.key==='Enter') doSearch()">
      <button class="btn" onclick="doSearch()">Chercher</button>
    </div>
    <div class="hints">
      <span class="hint">HME → commence par H</span>
      <span class="hint">RZB → commence par X ou P</span>
      <span class="hint">Immatriculation</span>
      <span class="hint">Mots-clés libres</span>
    </div>
    <div id="search-results"></div>
  </div>
  <div id="tab-multi" class="tab-panel">
    <div class="section-label">Une entrée par ligne</div>
    <textarea id="multi-input" class="multi-textarea" rows="8"
      placeholder="H01100M&#10;X001L&#10;AB-123-CD&#10;pelle bassin"></textarea>
    <div style="display:flex;gap:8px;margin-top:.8rem;margin-bottom:1.4rem">
      <button class="btn" onclick="doMulti()">Lancer</button>
      <button class="btn btn-outline" onclick="exportMultiCSV()">Exporter CSV</button>
    </div>
    <div id="multi-results"></div>
  </div>
</div>

<div class="modal-backdrop" id="edit-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">Modifier la fiche</div>
    <div class="field"><label>HME</label><input id="edit-hme" disabled></div>
    <div class="field"><label>RZB</label><input id="edit-rzb" disabled></div>
    <div class="field"><label>Libellé</label><input id="edit-libelle"></div>
    <div class="field"><label>Immatriculation</label><input id="edit-immat"></div>
    <div class="field"><label>Agence</label><input id="edit-agence"></div>
    <div class="field"><label>Commentaire</label><textarea id="edit-comment"></textarea></div>
    <div class="field"><label>N° Série</label><input id="edit-serie"></div>
    <div class="field"><label>N° Série Grue</label><input id="edit-serie-grue"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Annuler</button>
      <button class="btn" onclick="saveEdit()">Enregistrer</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

const LS_KEY = 'parc_overrides_v1';

function getOverrides() {
  try { return JSON.parse(localStorage.getItem(LS_KEY) || '{}'); }
  catch { return {}; }
}
function saveOverride(hme, patch) {
  const ov = getOverrides();
  ov[hme.toUpperCase()] = Object.assign(ov[hme.toUpperCase()] || {}, patch);
  localStorage.setItem(LS_KEY, JSON.stringify(ov));
}
function getMergedData() {
  const ov = getOverrides();
  return BASE_DATA.map(r => {
    const key = r.hme.toUpperCase();
    return ov[key] ? Object.assign({}, r, ov[key]) : r;
  });
}

function normText(s) { return (s || '').trim().toUpperCase(); }
function normImmat(s) { return normText(s).replace(/[^A-Z0-9]/g,''); }

function searchData(query, data) {
  const q = normText(query);
  if (!q) return [];
  const tokens = q.split(/\s+/).filter(Boolean);
  return data.filter(r => {
    return tokens.every(tok => {
      const ti = normImmat(tok);
      return normText(r.hme).includes(tok)
        || normText(r.rzb).includes(tok)
        || normText(r.immat).includes(tok)
        || normText(r.agence).includes(tok)
        || normText(r.libelle).includes(tok)
        || normText(r.commentaire).includes(tok)
        || (ti && normImmat(r.immat).includes(ti));
    });
  });
}

function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function detectMatchField(query, row) {
  const q = normText(query);
  if (normText(row.hme).includes(q)) return 'hme';
  if (normText(row.rzb).includes(q)) return 'rzb';
  return 'hme';
}

function renderCard(row, query) {
  const match = detectMatchField(query, row);
  const bigCode = escHtml(match === 'hme' ? row.rzb : row.hme);
  const bigTag  = match === 'hme' ? '→ N° PARC RZB' : '→ N° PARC HME';
  const ov = getOverrides()[row.hme.toUpperCase()];
  const badge = ov ? '<span class="badge-edit">modifié</span>' : '';
  const immatHtml = row.immat
    ? '<div class="result-row"><span class="result-label">Immatriculation</span><span class="result-value mono">'+escHtml(row.immat)+'</span></div>'
    : '';
  const comHtml = row.commentaire
    ? '<div class="result-comment">💬 '+escHtml(row.commentaire)+'</div>'
    : '';
  return '<div class="result-card">'
    +'<div class="result-tag">'+bigTag+'</div>'
    +'<div class="result-big">'+(bigCode||'—')+'</div>'
    +'<div class="result-row"><span class="result-label">HME</span><span class="result-value mono">'+escHtml(row.hme)+'</span></div>'
    +'<div class="result-row"><span class="result-label">RZB</span><span class="result-value mono">'+escHtml(row.rzb)+'</span></div>'
    +immatHtml
    +'<div class="result-row"><span class="result-label">Agence</span><span class="result-value">'+escHtml(row.agence)+'</span></div>'
    +'<div class="result-row"><span class="result-label">Libellé</span><span class="result-value">'+escHtml(row.libelle)+' '+badge+'</span></div>'
    +comHtml
    +'<div style="margin-top:1.2rem"><button class="btn btn-outline" onclick="openEdit(\''+escHtml(row.hme)+'\')">✏ Modifier</button></div>'
    +'</div>';
}

function renderSerie(row) {
  if (!row.serie && !row.serie_grue) {
    return '<div class="serie-card"><div class="serie-title">Numéros de série</div><div class="serie-empty">Aucun enregistré</div></div>';
  }
  const s1 = row.serie ? '<div class="serie-block"><div class="serie-block-label">N° Série</div><div class="serie-block-value">'+escHtml(row.serie)+'</div></div>' : '';
  const div = (row.serie && row.serie_grue) ? '<div class="serie-divider"></div>' : '';
  const s2 = row.serie_grue ? '<div class="serie-block"><div class="serie-block-label">N° Série Grue</div><div class="serie-block-value">'+escHtml(row.serie_grue)+'</div></div>' : '';
  return '<div class="serie-card"><div class="serie-title">Numéros de série</div>'+s1+div+s2+'</div>';
}

// ── SEARCH TAB ──────────────────────────────────────────────────
var lastQuery = '';
var lastResults = [];
var selectedIdx = null;

function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  lastQuery = q;
  document.getElementById('search-input').value = '';
  lastResults = searchData(q, getMergedData());
  selectedIdx = null;
  renderSearchResults();
}

function renderSearchResults() {
  const container = document.getElementById('search-results');
  if (!lastResults.length) {
    container.innerHTML = '<div class="no-result">Aucun résultat pour <em>« '+escHtml(lastQuery)+' »</em></div>';
    return;
  }
  if (lastResults.length === 1) {
    selectedIdx = 0;
    container.innerHTML = '<div class="result-grid"><div>'+renderCard(lastResults[0], lastQuery)+'</div><div>'+renderSerie(lastResults[0])+'</div></div>';
    return;
  }
  var tableRows = lastResults.map(function(r,i) {
    return '<tr class="'+(selectedIdx===i?'selected':'')+'" onclick="selectRow('+i+')">'
      +'<td>'+escHtml(r.agence)+'</td>'
      +'<td>'+escHtml(r.hme)+'</td>'
      +'<td>'+escHtml(r.rzb)+'</td>'
      +'<td>'+escHtml(r.immat)+'</td>'
      +'<td>'+escHtml(r.libelle.substring(0,40))+'</td>'
      +'</tr>';
  }).join('');

  var detail = '';
  if (selectedIdx !== null) {
    detail = '<div class="result-grid" style="margin-top:1rem"><div>'+renderCard(lastResults[selectedIdx], lastQuery)+'</div><div>'+renderSerie(lastResults[selectedIdx])+'</div></div>';
  }

  container.innerHTML = '<div class="section-label">'+lastResults.length+' résultat(s) — cliquez une ligne</div>'
    +'<div class="table-wrap"><table>'
    +'<thead><tr><th>Agence</th><th>HME</th><th>RZB</th><th>Immat</th><th>Libellé</th></tr></thead>'
    +'<tbody>'+tableRows+'</tbody></table></div>'
    +detail;
}

function selectRow(i) {
  selectedIdx = i;
  renderSearchResults();
}

// ── MULTI TAB ───────────────────────────────────────────────────
var multiOut = [];

function doMulti() {
  const raw = document.getElementById('multi-input').value;
  const items = Array.from(new Set(raw.split('\n').map(function(s){return s.trim();}).filter(Boolean)));
  const data = getMergedData();
  multiOut = [];
  const notFound = [];
  items.forEach(function(it) {
    const res = searchData(it, data);
    if (res.length) {
      res.forEach(function(r) { multiOut.push(Object.assign({search: it}, r)); });
    } else {
      notFound.push(it);
    }
  });

  const container = document.getElementById('multi-results');
  if (!multiOut.length) {
    container.innerHTML = '<div class="no-result">Aucun résultat pour la liste</div>';
    return;
  }

  const nfHtml = notFound.length
    ? '<div style="margin-top:.6rem"><span style="font-family:\'DM Mono\',monospace;font-size:.72rem;color:var(--muted)">NON TROUVÉES :</span><div class="not-found-list">'+notFound.map(function(x){return '<span class="nf-chip">'+escHtml(x)+'</span>';}).join('')+'</div></div>'
    : '';

  const rows = multiOut.map(function(r) {
    return '<tr>'
      +'<td>'+escHtml(r.search)+'</td>'
      +'<td>'+escHtml(r.agence)+'</td>'
      +'<td>'+escHtml(r.hme)+'</td>'
      +'<td>'+escHtml(r.rzb)+'</td>'
      +'<td>'+escHtml(r.immat)+'</td>'
      +'<td>'+escHtml(r.libelle.substring(0,35))+'</td>'
      +'</tr>';
  }).join('');

  const warnStat = notFound.length
    ? '<div class="stat-sep">·</div><div class="stat"><div class="stat-val warn">'+notFound.length+'</div><div class="stat-lbl">Non trouvées</div></div>'
    : '';

  container.innerHTML = '<div class="stats-bar">'
    +'<div class="stat"><div class="stat-val">'+items.length+'</div><div class="stat-lbl">Recherches</div></div>'
    +'<div class="stat-sep">·</div>'
    +'<div class="stat"><div class="stat-val">'+(items.length-notFound.length)+'</div><div class="stat-lbl">Trouvées</div></div>'
    +'<div class="stat-sep">·</div>'
    +'<div class="stat"><div class="stat-val">'+multiOut.length+'</div><div class="stat-lbl">Lignes</div></div>'
    +warnStat+'</div>'
    +nfHtml
    +'<div class="table-wrap"><table>'
    +'<thead><tr><th>Recherche</th><th>Agence</th><th>HME</th><th>RZB</th><th>Immat</th><th>Libellé</th></tr></thead>'
    +'<tbody>'+rows+'</tbody></table></div>';
}

function exportMultiCSV() {
  if (!multiOut.length) { showToast("Lancez d'abord une recherche"); return; }
  const cols = ['search','agence','hme','rzb','immat','libelle','commentaire','serie','serie_grue'];
  const header = ['Recherche','Agence','HME','RZB','Immat','Libellé','Commentaire','N°Série','N°SérieGrue'];
  const rows = multiOut.map(function(r) {
    return cols.map(function(c){ return '"'+((r[c]||'').replace(/"/g,'""'))+'"'; }).join(';');
  });
  const csv = [header.join(';')].concat(rows).join('\r\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'multi_resultats.csv';
  a.click();
}

// ── EDIT ────────────────────────────────────────────────────────
var editingHme = null;

function openEdit(hme) {
  const data = getMergedData();
  const row = data.find(function(r){ return normText(r.hme) === normText(hme); });
  if (!row) return;
  editingHme = row.hme;
  document.getElementById('edit-hme').value = row.hme;
  document.getElementById('edit-rzb').value = row.rzb;
  document.getElementById('edit-libelle').value = row.libelle;
  document.getElementById('edit-immat').value = row.immat;
  document.getElementById('edit-agence').value = row.agence;
  document.getElementById('edit-comment').value = row.commentaire;
  document.getElementById('edit-serie').value = row.serie;
  document.getElementById('edit-serie-grue').value = row.serie_grue;
  document.getElementById('edit-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('edit-modal').classList.remove('open');
  editingHme = null;
}

function saveEdit() {
  if (!editingHme) return;
  const patch = {
    libelle:     document.getElementById('edit-libelle').value,
    immat:       document.getElementById('edit-immat').value,
    agence:      document.getElementById('edit-agence').value,
    commentaire: document.getElementById('edit-comment').value,
    serie:       document.getElementById('edit-serie').value,
    serie_grue:  document.getElementById('edit-serie-grue').value,
  };
  saveOverride(editingHme, patch);
  closeModal();
  showToast('✓ Modifications enregistrées');
  if (lastQuery) { lastResults = searchData(lastQuery, getMergedData()); renderSearchResults(); }
}

// ── TABS ────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(function(t,i){
    t.classList.toggle('active', ['search','multi'][i] === name);
  });
  document.querySelectorAll('.tab-panel').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById('tab-'+name).classList.add('active');
}

// ── TOAST ───────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

// ── INIT ────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  const n = BASE_DATA.length;
  const agences = new Set(BASE_DATA.map(function(r){ return r.agence; })).size;
  document.getElementById('header-stats').textContent = n + ' engins · ' + agences + ' agences';
  document.getElementById('edit-modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
});

</script>
